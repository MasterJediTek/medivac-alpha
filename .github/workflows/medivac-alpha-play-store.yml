name: MediVacAlpha — Google Play Store (Fast Track)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. 1.0.29)'
        required: true
        default: '1.0.29'
      track:
        description: 'Release track'
        required: true
        type: choice
        options:
          - internal
          - alpha
          - beta
          - production
        default: internal
      upload_existing_aab:
        description: 'Upload pre-built AAB (skip native build)'
        required: false
        type: boolean
        default: true

env:
  NODE_VERSION: '22'
  JAVA_VERSION: '17'
  PACKAGE_NAME: 'space.manus.medivac.one.app'

# ─────────────────────────────────────────────
# JOB 1 — FAST TRACK: Upload pre-built AAB
# (downloads medivac-one-v1_0_29.aab from GitHub Release v1.0.29)
# ─────────────────────────────────────────────
jobs:
  fast-track-upload:
    name: Fast Track — Upload Pre-Built AAB
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.upload_existing_aab == 'true' || github.event_name == 'push' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download pre-built AAB from GitHub Release
        id: locate-aab
        run: |
          curl -L -o /tmp/medivac-one-v1_0_29.aab \
            "https://github.com/MasterJediTek/medivac-alpha/releases/download/v1.0.29/medivac-one-v1_0_29.aab"
          echo "aab_path=/tmp/medivac-one-v1_0_29.aab" >> $GITHUB_OUTPUT
          echo "Downloaded AAB: $(du -sh /tmp/medivac-one-v1_0_29.aab | cut -f1)"

      - name: Set up Google Play credentials
        run: |
          echo '${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}' > /tmp/service-account.json
          echo "Service account configured"

      - name: Install Fastlane Supply
        run: |
          sudo gem install fastlane --no-document
          fastlane --version

      - name: Upload AAB to Play Console (Internal Track)
        run: |
          fastlane supply \
            --aab "${{ steps.locate-aab.outputs.aab_path }}" \
            --package_name "${{ env.PACKAGE_NAME }}" \
            --json_key /tmp/service-account.json \
            --track "${{ github.event.inputs.track || 'internal' }}" \
            --skip_upload_apk true \
            --skip_upload_metadata false \
            --release_status "draft"
        continue-on-error: true

      # Fallback: use google-play-upload action
      - name: Upload AAB via r0adkll/upload-google-play
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: ${{ env.PACKAGE_NAME }}
          releaseFiles: ${{ steps.locate-aab.outputs.aab_path }}
          track: ${{ github.event.inputs.track || 'internal' }}
          status: draft
          inAppUpdatePriority: 2
        continue-on-error: true

      - name: Clean up credentials
        if: always()
        run: rm -f /tmp/service-account.json

  # ─────────────────────────────────────────────
  # JOB 2 — FULL BUILD from source (EAS / Gradle)
  # ─────────────────────────────────────────────
  full-build:
    name: Full Build & Publish
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.upload_existing_aab != 'true' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: Setup Expo token
        run: echo "EXPO_TOKEN=${{ secrets.EXPO_TOKEN }}" >> $GITHUB_ENV

      - name: Decode Android keystore
        run: |
          mkdir -p android/app
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/medivac-release.keystore

      - name: Build AAB with Gradle
        run: |
          cd android
          ./gradlew bundleRelease \
            -Pandroid.injected.signing.store.file=app/medivac-release.keystore \
            -Pandroid.injected.signing.store.password="${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" \
            -Pandroid.injected.signing.key.alias="${{ secrets.ANDROID_KEY_ALIAS }}" \
            -Pandroid.injected.signing.key.password="${{ secrets.ANDROID_KEY_PASSWORD }}"

      - name: Find built AAB
        id: find-aab
        run: |
          AAB=$(find android -name "*.aab" | head -1)
          echo "aab_path=$AAB" >> $GITHUB_OUTPUT
          echo "Built AAB: $AAB"

      - name: Upload to Play Store
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: ${{ env.PACKAGE_NAME }}
          releaseFiles: ${{ steps.find-aab.outputs.aab_path }}
          track: ${{ github.event.inputs.track || 'internal' }}
          status: completed
          inAppUpdatePriority: 2
          whatsNewDirectory: distribution/whatsnew

      - name: Upload AAB as artifact
        uses: actions/upload-artifact@v4
        with:
          name: medivac-alpha-aab
          path: ${{ steps.find-aab.outputs.aab_path }}
          retention-days: 90

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.find-aab.outputs.aab_path }}
          body: |
            ## MediVacAlpha v${{ github.event.inputs.version }} — JEDITek Proprietary

            **Track**: ${{ github.event.inputs.track }}
            **Package**: space.manus.medivac.one.app
            **Release**: Production-ready virtual hospital platform

            ### Features
            - ✅ 10-day free trial
            - ✅ Premium: $300/year or $25/month AUD
            - ✅ Enterprise auto-approval at $30,000
            - ✅ HIPAA + GDPR compliant
            - ✅ JEDI Systems integration
          draft: false
          prerelease: ${{ github.event.inputs.track != 'production' }}

  # ─────────────────────────────────────────────
  # JOB 3 — Fast-Track Beta Testing Setup
  # ─────────────────────────────────────────────
  beta-testing-setup:
    name: Configure Beta Testing (20→100 users)
    runs-on: ubuntu-latest
    needs: [fast-track-upload]
    if: always() && (github.event.inputs.track == 'beta' || github.event.inputs.track == 'internal')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Configure beta testers
        run: |
          echo "📋 Beta Testing Configuration"
          echo "Initial testers: 20"
          echo "Target testers: 100"
          echo "Scale period: 14 days"
          echo "Daily increase: ~6 testers/day"
          echo ""
          echo "Schedule:"
          echo "  Day 1-2:  20 testers"
          echo "  Day 3-4:  26 testers"
          echo "  Day 5-7:  35 testers"
          echo "  Day 8-10: 50 testers"
          echo "  Day 11+:  100 testers"

      - name: Generate beta invite list template
        run: |
          cat > beta-testers.csv << 'EOF'
          email,name,group
          # Add beta tester emails here
          # stephen.orazi@gmail.com,Stephen Orazi,internal
          EOF
          echo "Beta tester template created: beta-testers.csv"
